<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1e"/>
      <stop offset="50%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="barG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="350" cy="250" rx="350" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="850" cy="400" rx="400" ry="250" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Bar chart -->
  <g filter="url(#shadow)">
    <!-- 7 bars for 7 days -->
    <g transform="translate(300, 120)">
      <!-- Day labels base line -->
      <line x1="0" y1="280" x2="600" y2="280" stroke="#6366f1" stroke-width="1" opacity="0.2"/>

      <!-- Mon -->
      <rect x="20" y="180" width="55" height="100" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="20" y="180" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="47" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">L</text>

      <!-- Tue -->
      <rect x="100" y="140" width="55" height="140" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="100" y="140" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="127" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">M</text>

      <!-- Wed -->
      <rect x="180" y="100" width="55" height="180" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="180" y="100" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="207" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">M</text>

      <!-- Thu -->
      <rect x="260" y="60" width="55" height="220" rx="6" fill="url(#barG)" opacity="0.9"/>
      <rect x="260" y="60" width="55" height="4" rx="2" fill="#c4b5fd" opacity="0.8"/>
      <text x="287" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">J</text>

      <!-- Fri -->
      <rect x="340" y="120" width="55" height="160" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="340" y="120" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="367" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">V</text>

      <!-- Sat -->
      <rect x="420" y="150" width="55" height="130" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="420" y="150" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="447" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">S</text>

      <!-- Sun -->
      <rect x="500" y="200" width="55" height="80" rx="6" fill="url(#barG)" opacity="0.85"/>
      <rect x="500" y="200" width="55" height="4" rx="2" fill="#a5b4fc" opacity="0.6"/>
      <text x="527" y="300" text-anchor="middle" fill="#6366f1" font-size="13" font-family="system-ui, sans-serif" opacity="0.6">D</text>
    </g>
  </g>

  <!-- Floating stat cards -->
  <g filter="url(#shadow)">
    <!-- Card top-left -->
    <g transform="translate(120, 130)">
      <rect width="130" height="60" rx="10" fill="#1a1533" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
      <text x="15" y="28" fill="#818cf8" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Chapitres</text>
      <text x="15" y="48" fill="#c4b5fd" font-size="20" font-weight="bold" font-family="system-ui, sans-serif">+342</text>
    </g>

    <!-- Card top-right -->
    <g transform="translate(950, 150)">
      <rect width="130" height="60" rx="10" fill="#1a1533" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
      <text x="15" y="28" fill="#a78bfa" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Teams</text>
      <text x="15" y="48" fill="#c4b5fd" font-size="20" font-weight="bold" font-family="system-ui, sans-serif">24</text>
    </g>

    <!-- Card bottom-left -->
    <g transform="translate(150, 380)">
      <rect width="130" height="60" rx="10" fill="#1a1533" stroke="#4f46e5" stroke-width="1" opacity="0.9"/>
      <text x="15" y="28" fill="#818cf8" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Oeuvres</text>
      <text x="15" y="48" fill="#a5b4fc" font-size="20" font-weight="bold" font-family="system-ui, sans-serif">87</text>
    </g>
  </g>

  <!-- Sparkles -->
  <circle cx="480" cy="140" r="3" fill="#a5b4fc" opacity="0.8" filter="url(#blur3)"/>
  <circle cx="750" cy="170" r="2" fill="#818cf8" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="280" cy="320" r="2.5" fill="#c4b5fd" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="920" cy="300" r="2" fill="#a5b4fc" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="200" cy="470" r="3" fill="#818cf8" opacity="0.5" filter="url(#blur3)"/>
  <circle cx="1050" cy="380" r="2.5" fill="#6366f1" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="100" cy="280" r="2" fill="#a78bfa" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="1100" cy="200" r="3" fill="#c4b5fd" opacity="0.5" filter="url(#blur3)"/>

  <!-- Diamonds -->
  <rect x="450" y="100" width="8" height="8" rx="1" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4" transform="rotate(45, 454, 104)"/>
  <rect x="850" y="360" width="10" height="10" rx="1" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3" transform="rotate(45, 855, 365)"/>
  <rect x="180" y="500" width="7" height="7" rx="1" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.35" transform="rotate(45, 183.5, 503.5)"/>

  <!-- Title area -->
  <text x="600" y="510" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="-1">Récap de la semaine</text>
  <rect x="420" y="530" width="360" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <text x="600" y="570" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui, sans-serif">Novel-Index</text>

  <!-- Top/bottom gradient fade -->
  <rect width="1200" height="80" fill="url(#bg)" opacity="0.5"/>
  <rect y="560" width="1200" height="70" fill="url(#bg)" opacity="0.7"/>
</svg>