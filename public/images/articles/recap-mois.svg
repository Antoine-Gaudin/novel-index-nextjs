<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#15082b"/>
      <stop offset="100%" stop-color="#0d0a1e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="calG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="400" cy="200" rx="350" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="800" cy="450" rx="400" ry="250" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="600" cy="300" rx="200" ry="200" fill="#7c3aed" opacity="0.06" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Central calendar -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <!-- Calendar body -->
    <rect width="400" height="320" rx="16" fill="#1e1040" stroke="#a855f7" stroke-width="1.5" opacity="0.95"/>

    <!-- Header bar -->
    <rect width="400" height="55" rx="16" fill="url(#calG)" opacity="0.25"/>
    <rect y="40" width="400" height="15" fill="#1e1040"/>

    <!-- Month text -->
    <text x="200" y="38" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">Mars 2026</text>

    <!-- Day headers -->
    <g fill="#7c3aed" font-size="11" font-family="system-ui, sans-serif" opacity="0.6">
      <text x="45" y="80" text-anchor="middle">L</text>
      <text x="100" y="80" text-anchor="middle">M</text>
      <text x="155" y="80" text-anchor="middle">M</text>
      <text x="210" y="80" text-anchor="middle">J</text>
      <text x="265" y="80" text-anchor="middle">V</text>
      <text x="320" y="80" text-anchor="middle">S</text>
      <text x="375" y="80" text-anchor="middle">D</text>
    </g>

    <!-- Calendar grid - week 1 -->
    <g fill="#e9d5ff" font-size="13" font-family="system-ui, sans-serif" opacity="0.4">
      <text x="265" y="115" text-anchor="middle">1</text>
      <text x="320" y="115" text-anchor="middle">2</text>
      <text x="375" y="115" text-anchor="middle">3</text>
    </g>

    <!-- Week 2 -->
    <g fill="#e9d5ff" font-size="13" font-family="system-ui, sans-serif" opacity="0.4">
      <text x="45" y="155" text-anchor="middle">4</text>
      <text x="100" y="155" text-anchor="middle">5</text>
      <text x="155" y="155" text-anchor="middle">6</text>
      <text x="210" y="155" text-anchor="middle">7</text>
      <text x="265" y="155" text-anchor="middle">8</text>
      <text x="320" y="155" text-anchor="middle">9</text>
      <text x="375" y="155" text-anchor="middle">10</text>
    </g>

    <!-- Week 3 with highlights -->
    <g font-size="13" font-family="system-ui, sans-serif">
      <text x="45" y="195" text-anchor="middle" fill="#e9d5ff" opacity="0.4">11</text>
      <circle cx="100" cy="190" r="14" fill="#a855f7" opacity="0.3"/>
      <text x="100" y="195" text-anchor="middle" fill="#c084fc">12</text>
      <text x="155" y="195" text-anchor="middle" fill="#e9d5ff" opacity="0.4">13</text>
      <text x="210" y="195" text-anchor="middle" fill="#e9d5ff" opacity="0.4">14</text>
      <circle cx="265" cy="190" r="14" fill="#a855f7" opacity="0.3"/>
      <text x="265" y="195" text-anchor="middle" fill="#c084fc">15</text>
      <text x="320" y="195" text-anchor="middle" fill="#e9d5ff" opacity="0.4">16</text>
      <text x="375" y="195" text-anchor="middle" fill="#e9d5ff" opacity="0.4">17</text>
    </g>

    <!-- Week 4 -->
    <g font-size="13" font-family="system-ui, sans-serif">
      <text x="45" y="235" text-anchor="middle" fill="#e9d5ff" opacity="0.4">18</text>
      <text x="100" y="235" text-anchor="middle" fill="#e9d5ff" opacity="0.4">19</text>
      <circle cx="155" cy="230" r="14" fill="#7c3aed" opacity="0.4"/>
      <text x="155" y="235" text-anchor="middle" fill="#e9d5ff">20</text>
      <text x="210" y="235" text-anchor="middle" fill="#e9d5ff" opacity="0.4">21</text>
      <circle cx="265" cy="230" r="14" fill="#a855f7" opacity="0.25"/>
      <text x="265" y="235" text-anchor="middle" fill="#c084fc">22</text>
      <text x="320" y="235" text-anchor="middle" fill="#e9d5ff" opacity="0.4">23</text>
      <text x="375" y="235" text-anchor="middle" fill="#e9d5ff" opacity="0.4">24</text>
    </g>

    <!-- Week 5 -->
    <g fill="#e9d5ff" font-size="13" font-family="system-ui, sans-serif" opacity="0.4">
      <text x="45" y="275" text-anchor="middle">25</text>
      <text x="100" y="275" text-anchor="middle">26</text>
      <text x="155" y="275" text-anchor="middle">27</text>
      <text x="210" y="275" text-anchor="middle">28</text>
      <text x="265" y="275" text-anchor="middle">29</text>
      <text x="320" y="275" text-anchor="middle">30</text>
      <text x="375" y="275" text-anchor="middle">31</text>
    </g>

    <!-- Activity dots under some days -->
    <circle cx="100" cy="165" r="3" fill="#a855f7" opacity="0.6"/>
    <circle cx="210" cy="165" r="3" fill="#c084fc" opacity="0.5"/>
    <circle cx="265" cy="205" r="3" fill="#a855f7" opacity="0.6"/>
    <circle cx="155" cy="245" r="3" fill="#c084fc" opacity="0.5"/>
    <circle cx="45" cy="245" r="3" fill="#7c3aed" opacity="0.4"/>
  </g>

  <!-- Floating stat badges -->
  <g filter="url(#shadow)">
    <g transform="translate(120, 180)">
      <rect width="140" height="55" rx="10" fill="#1e1040" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
      <text x="15" y="24" fill="#a855f7" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Total chapitres</text>
      <text x="15" y="44" fill="#e9d5ff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">1 247</text>
    </g>

    <g transform="translate(940, 200)">
      <rect width="140" height="55" rx="10" fill="#1e1040" stroke="#7c3aed" stroke-width="1" opacity="0.9"/>
      <text x="15" y="24" fill="#a855f7" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Oeuvres actives</text>
      <text x="15" y="44" fill="#e9d5ff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">156</text>
    </g>

    <g transform="translate(160, 360)">
      <rect width="130" height="55" rx="10" fill="#1e1040" stroke="#7c3aed" stroke-width="1" opacity="0.9"/>
      <text x="15" y="24" fill="#a855f7" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Teams</text>
      <text x="15" y="44" fill="#e9d5ff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">38</text>
    </g>

    <g transform="translate(910, 370)">
      <rect width="140" height="55" rx="10" fill="#1e1040" stroke="#c084fc" stroke-width="1" opacity="0.9"/>
      <text x="15" y="24" fill="#c084fc" font-size="11" font-family="system-ui, sans-serif" opacity="0.7">Tendance</text>
      <text x="15" y="44" fill="#e9d5ff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">+12%</text>
    </g>
  </g>

  <!-- Sparkles -->
  <circle cx="550" cy="130" r="3" fill="#c084fc" opacity="0.8" filter="url(#blur3)"/>
  <circle cx="700" cy="160" r="2" fill="#e9d5ff" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="350" cy="300" r="2.5" fill="#a855f7" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="900" cy="280" r="2" fill="#c084fc" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="250" cy="460" r="3" fill="#7c3aed" opacity="0.5" filter="url(#blur3)"/>
  <circle cx="1000" cy="460" r="2.5" fill="#a855f7" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="140" cy="280" r="2" fill="#c084fc" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="1080" cy="160" r="3" fill="#e9d5ff" opacity="0.5" filter="url(#blur3)"/>

  <!-- Diamonds -->
  <rect x="480" y="90" width="8" height="8" rx="1" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4" transform="rotate(45, 484, 94)"/>
  <rect x="830" y="400" width="10" height="10" rx="1" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3" transform="rotate(45, 835, 405)"/>
  <rect x="120" y="440" width="7" height="7" rx="1" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.35" transform="rotate(45, 123.5, 443.5)"/>
  <rect x="1050" y="300" width="9" height="9" rx="1" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3" transform="rotate(45, 1054.5, 304.5)"/>

  <!-- Title area -->
  <text x="600" y="510" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="-1">Bilan du mois</text>
  <rect x="440" y="530" width="320" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <text x="600" y="570" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui, sans-serif">Novel-Index</text>

  <!-- Top/bottom gradient fade -->
  <rect width="1200" height="80" fill="url(#bg)" opacity="0.5"/>
  <rect y="560" width="1200" height="70" fill="url(#bg)" opacity="0.7"/>
</svg>