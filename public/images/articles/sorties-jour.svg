<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="50%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bookG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="200" rx="350" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="900" cy="450" rx="400" ry="250" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="600" cy="315" rx="200" ry="200" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Floating pages/chapters -->
  <g filter="url(#shadow)">
    <!-- Page 1 -->
    <g transform="translate(180, 140) rotate(-12)">
      <rect width="100" height="140" rx="6" fill="#1e1533" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
      <rect x="12" y="16" width="76" height="4" rx="2" fill="#8b5cf6" opacity="0.5"/>
      <rect x="12" y="28" width="60" height="3" rx="1.5" fill="#6366f1" opacity="0.3"/>
      <rect x="12" y="38" width="70" height="3" rx="1.5" fill="#6366f1" opacity="0.3"/>
      <rect x="12" y="48" width="50" height="3" rx="1.5" fill="#6366f1" opacity="0.3"/>
      <rect x="12" y="64" width="76" height="50" rx="4" fill="#8b5cf6" opacity="0.15"/>
      <text x="50" y="94" text-anchor="middle" fill="#a78bfa" font-size="20" font-family="serif">Ch.</text>
    </g>

    <!-- Page 2 -->
    <g transform="translate(340, 100) rotate(5)">
      <rect width="110" height="150" rx="6" fill="#1a1030" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
      <rect x="14" y="18" width="82" height="4" rx="2" fill="#a855f7" opacity="0.5"/>
      <rect x="14" y="30" width="65" height="3" rx="1.5" fill="#7c3aed" opacity="0.3"/>
      <rect x="14" y="40" width="75" height="3" rx="1.5" fill="#7c3aed" opacity="0.3"/>
      <rect x="14" y="56" width="82" height="65" rx="4" fill="#a855f7" opacity="0.12"/>
      <text x="55" y="95" text-anchor="middle" fill="#c4b5fd" font-size="22" font-family="serif">新</text>
    </g>

    <!-- Page 3 -->
    <g transform="translate(760, 120) rotate(-8)">
      <rect width="105" height="145" rx="6" fill="#1e1030" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
      <rect x="13" y="17" width="79" height="4" rx="2" fill="#ec4899" opacity="0.5"/>
      <rect x="13" y="29" width="62" height="3" rx="1.5" fill="#db2777" opacity="0.3"/>
      <rect x="13" y="39" width="72" height="3" rx="1.5" fill="#db2777" opacity="0.3"/>
      <rect x="13" y="55" width="79" height="60" rx="4" fill="#ec4899" opacity="0.12"/>
    </g>

    <!-- Page 4 -->
    <g transform="translate(920, 160) rotate(10)">
      <rect width="95" height="130" rx="6" fill="#171028" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
      <rect x="11" y="15" width="73" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
      <rect x="11" y="27" width="55" height="3" rx="1.5" fill="#4f46e5" opacity="0.3"/>
      <rect x="11" y="37" width="65" height="3" rx="1.5" fill="#4f46e5" opacity="0.3"/>
    </g>
  </g>

  <!-- Central open book -->
  <g transform="translate(460, 220)" filter="url(#shadow)">
    <!-- Left page -->
    <path d="M0,0 Q10,-8 140,-4 L140,180 Q10,176 0,184 Z" fill="#1e1533" stroke="#8b5cf6" stroke-width="1"/>
    <rect x="16" y="20" width="100" height="3" rx="1.5" fill="#8b5cf6" opacity="0.4"/>
    <rect x="16" y="32" width="90" height="2.5" rx="1" fill="#6366f1" opacity="0.25"/>
    <rect x="16" y="42" width="105" height="2.5" rx="1" fill="#6366f1" opacity="0.25"/>
    <rect x="16" y="52" width="80" height="2.5" rx="1" fill="#6366f1" opacity="0.25"/>
    <rect x="16" y="68" width="105" height="2.5" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="16" y="78" width="95" height="2.5" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="16" y="88" width="100" height="2.5" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="16" y="104" width="85" height="2.5" rx="1" fill="#6366f1" opacity="0.15"/>
    <rect x="16" y="114" width="105" height="2.5" rx="1" fill="#6366f1" opacity="0.15"/>

    <!-- Right page -->
    <path d="M140,-4 Q270,-8 280,0 L280,184 Q270,176 140,180 Z" fill="#1a1030" stroke="#a855f7" stroke-width="1"/>
    <rect x="156" y="20" width="100" height="3" rx="1.5" fill="#a855f7" opacity="0.4"/>
    <rect x="156" y="32" width="88" height="2.5" rx="1" fill="#7c3aed" opacity="0.25"/>
    <rect x="156" y="42" width="105" height="2.5" rx="1" fill="#7c3aed" opacity="0.25"/>
    <rect x="156" y="52" width="75" height="2.5" rx="1" fill="#7c3aed" opacity="0.25"/>
    <rect x="156" y="68" width="100" height="2.5" rx="1" fill="#7c3aed" opacity="0.2"/>
    <rect x="156" y="78" width="92" height="2.5" rx="1" fill="#7c3aed" opacity="0.2"/>

    <!-- Spine glow -->
    <line x1="140" y1="-4" x2="140" y2="180" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <circle cx="520" cy="180" r="3" fill="#c4b5fd" opacity="0.8" filter="url(#blur3)"/>
  <circle cx="700" cy="200" r="2" fill="#f9a8d4" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="380" cy="300" r="2.5" fill="#a5b4fc" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="830" cy="280" r="2" fill="#c4b5fd" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="250" cy="380" r="3" fill="#f0abfc" opacity="0.5" filter="url(#blur3)"/>
  <circle cx="950" cy="350" r="2.5" fill="#a78bfa" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="150" cy="250" r="2" fill="#818cf8" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="1050" cy="220" r="3" fill="#e9d5ff" opacity="0.5" filter="url(#blur3)"/>

  <!-- Diamonds -->
  <rect x="430" y="140" width="8" height="8" rx="1" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4" transform="rotate(45, 434, 144)"/>
  <rect x="780" y="380" width="10" height="10" rx="1" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3" transform="rotate(45, 785, 385)"/>
  <rect x="150" y="450" width="7" height="7" rx="1" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.35" transform="rotate(45, 153.5, 453.5)"/>
  <rect x="1020" y="140" width="9" height="9" rx="1" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3" transform="rotate(45, 1024.5, 144.5)"/>

  <!-- Title area -->
  <text x="600" y="510" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="-1">Sorties du jour</text>
  <rect x="460" y="530" width="280" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <text x="600" y="570" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui, sans-serif">Novel-Index</text>

  <!-- Top/bottom gradient fade -->
  <rect width="1200" height="80" fill="url(#bg)" opacity="0.5"/>
  <rect y="560" width="1200" height="70" fill="url(#bg)" opacity="0.7"/>
</svg>
