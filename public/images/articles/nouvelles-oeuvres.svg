<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1e15"/>
      <stop offset="50%" stop-color="#0d1e1a"/>
      <stop offset="100%" stop-color="#0a1a12"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="coverG1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="coverG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="coverG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="shadowSm"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="250" rx="350" ry="300" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="900" cy="350" rx="400" ry="250" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="600" cy="300" rx="200" ry="200" fill="#22c55e" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Book covers cascade -->
  <g filter="url(#shadow)">
    <!-- Book 1 (back-left) -->
    <g transform="translate(200, 130) rotate(-8)">
      <rect width="120" height="170" rx="8" fill="#122a1c" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
      <rect x="10" y="15" width="100" height="60" rx="5" fill="url(#coverG1)" opacity="0.2"/>
      <rect x="10" y="85" width="80" height="4" rx="2" fill="#22c55e" opacity="0.4"/>
      <rect x="10" y="95" width="60" height="3" rx="1.5" fill="#16a34a" opacity="0.3"/>
      <rect x="10" y="105" width="70" height="3" rx="1.5" fill="#16a34a" opacity="0.25"/>
      <text x="60" y="52" text-anchor="middle" fill="#4ade80" font-size="28" font-family="serif" opacity="0.6">WN</text>
    </g>

    <!-- Book 2 -->
    <g transform="translate(370, 110) rotate(3)">
      <rect width="130" height="185" rx="8" fill="#132a1a" stroke="#4ade80" stroke-width="1.5" opacity="0.9"/>
      <rect x="12" y="16" width="106" height="70" rx="5" fill="url(#coverG2)" opacity="0.2"/>
      <rect x="12" y="96" width="85" height="4" rx="2" fill="#4ade80" opacity="0.4"/>
      <rect x="12" y="108" width="65" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
      <rect x="12" y="118" width="75" height="3" rx="1.5" fill="#22c55e" opacity="0.25"/>
      <rect x="12" y="128" width="55" height="3" rx="1.5" fill="#22c55e" opacity="0.2"/>
      <text x="65" y="58" text-anchor="middle" fill="#86efac" font-size="28" font-family="serif" opacity="0.6">LN</text>
    </g>

    <!-- Book 3 (center, prominent) -->
    <g transform="translate(530, 90)">
      <rect width="140" height="200" rx="8" fill="#153020" stroke="#4ade80" stroke-width="2" opacity="0.95"/>
      <rect x="14" y="18" width="112" height="80" rx="6" fill="url(#coverG3)" opacity="0.25"/>
      <circle cx="70" cy="55" r="20" fill="#4ade80" opacity="0.12"/>
      <text x="70" y="62" text-anchor="middle" fill="#86efac" font-size="16" font-weight="bold" font-family="system-ui, sans-serif">NEW</text>
      <rect x="14" y="110" width="90" height="5" rx="2.5" fill="#4ade80" opacity="0.5"/>
      <rect x="14" y="124" width="70" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
      <rect x="14" y="134" width="80" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
      <rect x="14" y="144" width="60" height="3" rx="1.5" fill="#22c55e" opacity="0.25"/>
      <rect x="14" y="160" width="112" height="3" rx="1.5" fill="#16a34a" opacity="0.15"/>
      <rect x="14" y="170" width="90" height="3" rx="1.5" fill="#16a34a" opacity="0.15"/>
    </g>

    <!-- Book 4 -->
    <g transform="translate(720, 120) rotate(-5)">
      <rect width="125" height="175" rx="8" fill="#122a1c" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
      <rect x="11" y="15" width="103" height="65" rx="5" fill="url(#coverG1)" opacity="0.2"/>
      <rect x="11" y="90" width="82" height="4" rx="2" fill="#22c55e" opacity="0.4"/>
      <rect x="11" y="102" width="62" height="3" rx="1.5" fill="#16a34a" opacity="0.3"/>
      <rect x="11" y="112" width="72" height="3" rx="1.5" fill="#16a34a" opacity="0.25"/>
      <text x="62" y="55" text-anchor="middle" fill="#4ade80" font-size="24" font-family="serif" opacity="0.6">漫</text>
    </g>

    <!-- Book 5 (back-right) -->
    <g transform="translate(900, 140) rotate(7)">
      <rect width="115" height="165" rx="8" fill="#122a1c" stroke="#16a34a" stroke-width="1.5" opacity="0.9"/>
      <rect x="10" y="14" width="95" height="55" rx="5" fill="url(#coverG2)" opacity="0.18"/>
      <rect x="10" y="80" width="75" height="4" rx="2" fill="#22c55e" opacity="0.35"/>
      <rect x="10" y="92" width="55" height="3" rx="1.5" fill="#16a34a" opacity="0.25"/>
      <rect x="10" y="102" width="65" height="3" rx="1.5" fill="#16a34a" opacity="0.2"/>
      <text x="57" y="50" text-anchor="middle" fill="#4ade80" font-size="22" font-family="serif" opacity="0.5">WT</text>
    </g>
  </g>

  <!-- Plus icons scattered -->
  <g filter="url(#shadowSm)">
    <g transform="translate(300, 330)">
      <circle r="16" fill="#122a1c" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(900, 350)">
      <circle r="14" fill="#122a1c" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(150, 400)">
      <circle r="12" fill="#122a1c" stroke="#16a34a" stroke-width="1" opacity="0.6"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(1050, 280)">
      <circle r="13" fill="#122a1c" stroke="#22c55e" stroke-width="1" opacity="0.65"/>
      <line x1="-5.5" y1="0" x2="5.5" y2="0" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Sparkles -->
  <circle cx="480" cy="120" r="3" fill="#86efac" opacity="0.8" filter="url(#blur3)"/>
  <circle cx="680" cy="100" r="2" fill="#4ade80" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="350" cy="280" r="2.5" fill="#86efac" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="850" cy="250" r="2" fill="#4ade80" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="230" cy="460" r="3" fill="#22c55e" opacity="0.5" filter="url(#blur3)"/>
  <circle cx="970" cy="430" r="2.5" fill="#4ade80" opacity="0.6" filter="url(#blur3)"/>
  <circle cx="120" cy="300" r="2" fill="#86efac" opacity="0.7" filter="url(#blur3)"/>
  <circle cx="1100" cy="180" r="3" fill="#4ade80" opacity="0.5" filter="url(#blur3)"/>

  <!-- Diamonds -->
  <rect x="440" y="80" width="8" height="8" rx="1" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4" transform="rotate(45, 444, 84)"/>
  <rect x="810" y="380" width="10" height="10" rx="1" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3" transform="rotate(45, 815, 385)"/>
  <rect x="130" y="480" width="7" height="7" rx="1" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.35" transform="rotate(45, 133.5, 483.5)"/>
  <rect x="1060" y="120" width="9" height="9" rx="1" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3" transform="rotate(45, 1064.5, 124.5)"/>

  <!-- Title area -->
  <text x="600" y="510" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="-1">Nouvelles oeuvres</text>
  <rect x="430" y="530" width="340" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <text x="600" y="570" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui, sans-serif">Novel-Index</text>

  <!-- Top/bottom gradient fade -->
  <rect width="1200" height="80" fill="url(#bg)" opacity="0.5"/>
  <rect y="560" width="1200" height="70" fill="url(#bg)" opacity="0.7"/>
</svg>